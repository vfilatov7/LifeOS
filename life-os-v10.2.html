function destroyTravelMap(){
  if(travelMap){try{travelMap.remove()}catch(e){}travelMap=null}
}
async function initTravelMap(){
  const el=document.getElementById('travel-map');
  if(!el||!st.travel.length)return;
  destroyTravelMap();

  const worldBounds=L.latLngBounds([[-85,-180],[85,180]]);
  travelMap=L.map('travel-map',{scrollWheelZoom:true,zoomControl:true,attributionControl:false,
    maxBounds:worldBounds,maxBoundsViscosity:1.0,minZoom:1,worldCopyJump:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
    maxZoom:18,subdomains:'abcd',noWrap:true,bounds:worldBounds
  }).addTo(travelMap);

  const visited=st.travel.filter(t=>!t.planned);
  const planned=st.travel.filter(t=>t.planned);

  // Collect visited/planned ISO codes (as both string and number for cross-browser compat)
  const visitedISO=new Set();const plannedISO=new Set();
  visited.forEach(t=>{const iso=COUNTRY_ISO[t.country];if(iso){visitedISO.add(String(iso));visitedISO.add(Number(iso))}});
  planned.forEach(t=>{const iso=COUNTRY_ISO[t.country];if(iso){plannedISO.add(String(iso));plannedISO.add(Number(iso))}});

  function makePop(t){
    let h=`<div style="font-family:var(--sans);min-width:180px">`;
    h+=`<div style="font-size:15px;font-weight:600;margin-bottom:4px">${t.planned?'✈️':'📍'} ${t.country}${t.city?' · '+t.city:''}</div>`;
    if(t.dateFrom||t.dateTo)h+=`<div style="font-size:12px;color:#666;margin-bottom:4px">📅 ${t.dateFrom||''}${t.dateTo?' — '+t.dateTo:''}</div>`;
    if(t.notes)h+=`<div style="font-size:12px;color:#444;margin-bottom:4px">📝 ${t.notes}</div>`;
    if(t.album)h+=`<div style="margin-top:6px"><a href="${t.album}" target="_blank" style="font-size:12px;color:#6366f1;text-decoration:none;font-weight:500">📸 Фотоальбом →</a></div>`;
    h+=`</div>`;
    return h;
  }

  const allBounds=[];

  // Load and render country polygons
  const worldGeo=await fetchWorldGeo();
  if(!travelMap)return; // map was destroyed during fetch
  if(worldGeo){
    L.geoJSON(worldGeo,{
      style:feature=>{
        const id=feature.id;
        if(visitedISO.has(id))return{fillColor:'#6366f1',fillOpacity:0.45,weight:1.5,color:'#4f46e5',opacity:0.8};
        if(plannedISO.has(id))return{fillColor:'#f59e0b',fillOpacity:0.35,weight:1.5,color:'#d97706',opacity:0.8};
        return{fillColor:'transparent',fillOpacity:0,weight:0.3,color:'rgba(0,0,0,0.08)',opacity:1};
      },
      onEachFeature:(feature,layer)=>{
        const id=feature.id;
        if(visitedISO.has(id)||plannedISO.has(id)){
          // Find matching trips for popup
          const trips=st.travel.filter(t=>{const iso=COUNTRY_ISO[t.country];return iso&&(String(iso)===String(id)||Number(iso)===Number(id))});
          if(trips.length){
            const html=trips.map(t=>makePop(t)).join('<hr style="border:none;border-top:1px solid #eee;margin:8px 0">');
            layer.bindPopup(html,{maxWidth:300,className:'lifeos-popup'});
          }
          layer.on('mouseover',function(){if(!visitedISO.has(id)&&!plannedISO.has(id))return;this.setStyle({fillOpacity:visitedISO.has(id)?0.6:0.5,weight:2.5})});
          layer.on('mouseout',function(){if(!visitedISO.has(id)&&!plannedISO.has(id))return;this.setStyle({fillOpacity:visitedISO.has(id)?0.45:0.35,weight:1.5})});
        }
      }
    }).addTo(travelMap);
  }

  // Add city markers (on top of country polygons)
  const cityLayer=L.layerGroup().addTo(travelMap);
  st.travel.forEach(t=>{
    const c=getTripCoords(t);
    if(!c)return;
    allBounds.push(c);
    if(t.city){
      const color=t.planned?'#d97706':'#4f46e5';
      const fill=t.planned?'#fbbf24':'#818cf8';
      const marker=L.circleMarker(c,{radius:6,fillColor:fill,color:color,weight:2,opacity:1,fillOpacity:0.9,pane:'markerPane'});
      marker.bindPopup(makePop(t),{maxWidth:280,className:'lifeos-popup'});
      marker.addTo(cityLayer);
    }
  });

  if(allBounds.length>0){
    travelMap.fitBounds(allBounds,{padding:[40,40],maxZoom:5,minZoom:1});
  }else{
    travelMap.setView([30,30],2);
  }
}

  o.innerHTML=`<div class="modal"><h3>${q.name}</h3><p>Сколько минут?</p><input class="modal-input" id="t-in" type="number" min="1" max="600" placeholder="мин" autofocus><div style="font-size:12px;color:var(--text2);margin-bottom:12px;text-align:center" id="xp-p">×${XPM[q.cat]||0.5}/мин</div><div class="modal-btns"><button class="modal-btn" onclick="this.closest('.modal-overlay').remove()">Отмена</button><button class="modal-btn primary" id="t-ok">Записать</button></div></div>`;
  document.body.appendChild(o);o.addEventListener('click',e=>{if(e.target===o)o.remove()});
  const inp=o.querySelector('#t-in'),prev=o.querySelector('#xp-p');
  inp.addEventListener('input',()=>{const m=parseInt(inp.value)||0;prev.textContent=`= ${calcXP(q.cat,m)} XP за ${m} мин`});
  inp.focus();
  o.querySelector('#t-ok').addEventListener('click',()=>{
    const m=parseInt(inp.value)||0;if(m<=0)return;
    q.mins=m;q.xp=calcXP(q.cat,m);q.done=true;st.totalXP+=q.xp;
    st.history.push({id:q.id,name:q.name,cat:q.cat,xp:q.xp,mins:q.mins,ts:Date.now()});
    save();o.remove();render();
  });
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')o.querySelector('#t-ok').click()});
}

function extractJSON(raw){
  if(!raw||!raw.trim())return null;
  // Strip markdown code fences
  let s=raw.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
  // Try direct parse
  try{return JSON.parse(s)}catch(e){}
  // Try to find JSON array in text
  const ma=s.match(/\[[\s\S]*\]/);
  if(ma)try{return JSON.parse(ma[0])}catch(e){}
  // Try to find JSON object in text
  const m=s.match(/\{[\s\S]*\}/);
  if(m)try{return JSON.parse(m[0])}catch(e){}
  // Fix trailing commas
  try{return JSON.parse(s.replace(/,\s*([}\]])/g,'$1'))}catch(e){}
  // Try to repair truncated JSON — find the last complete object
  const objMatch=s.match(/\{[^{}]*\}/g);
  if(objMatch){
    for(let i=objMatch.length-1;i>=0;i--){
      try{return JSON.parse(objMatch[i])}catch(e){}
    }
    // Try first match
    try{return JSON.parse(objMatch[0])}catch(e){}
  }
  // Last resort: try to close truncated JSON
  let fix=s.replace(/```\s*$/,'');
  // Remove trailing incomplete key-value
  fix=fix.replace(/,?"[^"]*":\s*"?[^"}\]]*$/,'');
  // Close brackets
  const opens=(fix.match(/\{/g)||[]).length;
  const closes=(fix.match(/\}/g)||[]).length;
  for(let i=0;i<opens-closes;i++)fix+='}';
  const openA=(fix.match(/\[/g)||[]).length;
  const closeA=(fix.match(/\]/g)||[]).length;
  for(let i=0;i<openA-closeA;i++)fix+=']';
  try{return JSON.parse(fix)}catch(e){}
  console.warn('[extractJSON failed]',raw);
  return null;
}

function previewMenuPhoto(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const canvas=document.createElement('canvas');
      const targetW=400,targetH=300;
      // Crop to 3:4 center then resize
      const srcRatio=img.width/img.height,tgtRatio=targetW/targetH;
      let sx=0,sy=0,sw=img.width,sh=img.height;
      if(srcRatio>tgtRatio){sw=img.height*tgtRatio;sx=(img.width-sw)/2}
      else{sh=img.width/tgtRatio;sy=(img.height-sh)/2}
      canvas.width=targetW;canvas.height=targetH;
      const ctx=canvas.getContext('2d');
      ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img,sx,sy,sw,sh,0,0,targetW,targetH);
      const base64=canvas.toDataURL('image/jpeg',0.65);
      document.getElementById('mi-img').value=base64;
      const prev=document.getElementById('mi-preview');
      prev.style.display='block';
      prev.innerHTML=`<img src="${base64}" style="width:100%;height:140px;object-fit:cover;border-radius:14px;display:block">`;
      const lbl=document.getElementById('mi-photo-label');
      if(lbl)lbl.childNodes[0].textContent='📸 Заменить';
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function confirmLogFromMenu(idx){
  const m=st.food.menu[idx];if(!m)return;
  const g=parseFloat(document.getElementById('ml-grams').value);
  if(!g||g<=0){alert('Введи граммы');return}
  const mult=g/100;
  st.food.entries.push({name:`${m.name} (${g}г)`,icon:m.icon||'🍽️',grams:g,kcal:m.kcal*mult,protein:m.protein*mult,fat:m.fat*mult,carbs:m.carbs*mult,fiber:(m.fiber||0)*mult,sugar:(m.sugar||0)*mult,ts:Date.now()});
  st.foodHistory.push({name:m.name,icon:m.icon,grams:g,kcal:m.kcal*mult,protein:m.protein*mult,fat:m.fat*mult,carbs:m.carbs*mult,fiber:(m.fiber||0)*mult,sugar:(m.sugar||0)*mult,ts:Date.now()});
  save();document.querySelector('.modal-overlay').remove();foodTab='tracker';render();
}

function saveFoodEdit(idx){
  const e=st.food.entries[idx];if(!e)return;
  e.name=document.getElementById('fe-name').value.trim()||e.name;
  e.grams=parseFloat(document.getElementById('fe-grams').value)||0;
  e.kcal=parseFloat(document.getElementById('fe-kcal').value)||0;
  e.protein=parseFloat(document.getElementById('fe-protein').value)||0;
  e.fat=parseFloat(document.getElementById('fe-fat').value)||0;
  e.carbs=parseFloat(document.getElementById('fe-carbs').value)||0;
  e.fiber=parseFloat(document.getElementById('fe-fiber').value)||0;
  e.sugar=parseFloat(document.getElementById('fe-sugar').value)||0;
  save();document.querySelector('.modal-overlay').remove();render();
}

function deleteFoodEntry(idx){
  if(!confirm('Удалить запись?'))return;
  // Also remove from foodHistory
  const e=st.food.entries[idx];
  if(e){const hi=st.foodHistory.findIndex(h=>h.name===e.name&&Math.abs((h.ts||0)-Date.now())<86400000);if(hi>=0)st.foodHistory.splice(hi,1)}
  st.food.entries.splice(idx,1);save();render();
}

async function sendFood(){
  if(!hasKey()){switchTab('settings');return}
  const inp=document.getElementById('food-in'),text=inp.value.trim();if(!text)return;
  st.foodChatHistory.push({role:'user',text});inp.value='';save();render();
  const msgs=document.getElementById('food-msgs'),t=document.createElement('div');t.className='msg ai';t.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';msgs.appendChild(t);scrollC('food-msgs');
  try{
    const ai=await callAI(F_SYS,text);t.remove();
    console.log('[Food AI raw]',ai);
    let parsed=extractJSON(ai);
    console.log('[Food AI parsed]',parsed);
    // Normalize: wrap single object in array
    if(parsed&&!Array.isArray(parsed))parsed=[parsed];
    // Fix entries with missing/empty "name"
    if(Array.isArray(parsed))parsed=parsed.map(p=>{
      if((!p.name||!p.name.trim())&&(p.kcal||p.grams||p.protein)){p.name=text.replace(/[\d\s]*[гgграммgrмлml]+$/i,'').replace(/[-–—]\s*$/,'').trim().slice(0,25)||'Блюдо'}
      if(p.name)p.name=p.name.trim();
      return p;
    }).filter(p=>p.name&&p.name.trim());
    if(Array.isArray(parsed)&&parsed.length>0){
      const parts=[];
      for(const p of parsed){
        const entry={name:p.name,icon:p.icon||'🍽️',grams:Number(p.grams)||0,kcal:Number(p.kcal)||0,protein:Number(p.protein)||0,fat:Number(p.fat)||0,carbs:Number(p.carbs)||0,fiber:Number(p.fiber)||0,sugar:Number(p.sugar)||0};
        st.food.entries.push(entry);
        st.foodHistory.push({...entry,ts:Date.now()});
        parts.push(`<strong>${p.name}</strong>${entry.grams?' ('+entry.grams+'г)':''} — ${Math.round(entry.kcal)} ккал<br><span style="font-size:11px;color:var(--text3)">Б${Math.round(entry.protein)} Ж${Math.round(entry.fat)} У${Math.round(entry.carbs)} Кл${Math.round(entry.fiber)} С${Math.round(entry.sugar)}</span>`);
      }
      st.foodChatHistory.push({role:'ai',html:'Записал: '+parts.join('<br style="margin:6px 0">')});
    }else{console.warn('[Food AI fail]',ai,parsed);st.foodChatHistory.push({role:'ai',html:'Не удалось распознать. Попробуй короче: "курица с овощами 300г"'})}
  }catch(e){t.remove();st.foodChatHistory.push({role:'ai',html:'Ошибка связи.'})}
  save();render();
}

let standbyActive=false;
let standbyInterval=null;
let standbyQuoteIdx=Math.floor(Math.random()*QUOTES.length);
let idleTimer=null;
const IDLE_MS=5*60*1000; // 5 min

function enterStandby(){
  standbyActive=true;
  document.body.style.overflow='hidden';
  const overlay=document.createElement('div');
  overlay.id='standby';
  overlay.className='standby-overlay';
  overlay.innerHTML=`
    <div class="lava lava-1"></div>
    <div class="lava lava-2"></div>
    <div class="lava lava-3"></div>
    <div class="lava lava-4"></div>
    <div class="lava lava-5"></div>
    <div class="standby-content">
      <div class="standby-time" id="sb-time"></div>
      <div class="standby-date" id="sb-date"></div>
      <div class="standby-quote" id="sb-quote"></div>
      <div class="standby-author" id="sb-author"></div>
      <div class="standby-stats">
        <div class="standby-stat"><div class="standby-stat-val" id="sb-level"></div><div class="standby-stat-label">уровень</div></div>
        <div class="standby-stat"><div class="standby-stat-val" id="sb-xp"></div><div class="standby-stat-label">XP</div></div>
        <div class="standby-stat"><div class="standby-stat-val" id="sb-streak"></div><div class="standby-stat-label">стрик</div></div>
        <div class="standby-stat"><div class="standby-stat-val" id="sb-day"></div><div class="standby-stat-label">день спринта</div></div>
      </div>
      <div class="standby-xp-bar"><div class="standby-xp-fill" id="sb-xpbar"></div></div>
      <div class="standby-hint">нажми чтобы выйти</div>
    </div>
  `;
  overlay.addEventListener('click',exitStandby);
  document.body.appendChild(overlay);
  updateStandby();
  standbyInterval=setInterval(updateStandby,1000);
  // Rotate quotes every 15s
  setInterval(()=>{
    if(!standbyActive)return;
    standbyQuoteIdx=(standbyQuoteIdx+1)%QUOTES.length;
    const qEl=document.getElementById('sb-quote');
    const aEl=document.getElementById('sb-author');
    if(qEl){qEl.style.opacity='0';setTimeout(()=>{qEl.textContent=QUOTES[standbyQuoteIdx].text;qEl.style.opacity='1'},500)}
    if(aEl)setTimeout(()=>{aEl.textContent='— '+QUOTES[standbyQuoteIdx].author},500);
  },15000);
}

function exitStandby(){
  standbyActive=false;
  document.body.style.overflow='';
  const el=document.getElementById('standby');
  if(el)el.remove();
  clearInterval(standbyInterval);
  resetIdle();
}

function updateStandby(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  const months=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const dayN=['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
  const te=document.getElementById('sb-time');if(te)te.textContent=`${h}:${m}`;
  const de=document.getElementById('sb-date');if(de)de.textContent=`${dayN[now.getDay()]} · ${now.getDate()} ${months[now.getMonth()]}`;
  const q=QUOTES[standbyQuoteIdx];
  const qe=document.getElementById('sb-quote');if(qe&&!qe.textContent)qe.textContent=q.text;
  const ae=document.getElementById('sb-author');if(ae&&!ae.textContent)ae.textContent='— '+q.author;
  const info=calcLv(st.totalXP);
  const le=document.getElementById('sb-level');if(le)le.textContent=info.level;
  const xe=document.getElementById('sb-xp');if(xe)xe.textContent=st.totalXP;
  const se=document.getElementById('sb-streak');if(se)se.textContent=st.streak+'д';
  const sd=document.getElementById('sb-day');if(sd)sd.textContent=getSprintDay()<=14?getSprintDay()+'/14':'—';
  const xb=document.getElementById('sb-xpbar');if(xb)xb.style.width=Math.round(info.cur/info.need*100)+'%';
}

// Auto-standby after 5min idle
function resetIdle(){
  clearTimeout(idleTimer);
  idleTimer=setTimeout(()=>{if(!standbyActive)enterStandby()},IDLE_MS);
}
['mousemove','mousedown','keydown','touchstart','scroll'].forEach(e=>document.addEventListener(e,resetIdle,{passive:true}));
resetIdle();
function scrollC(id){const el=document.getElementById(id);if(el)el.scrollTop=el.scrollHeight}
function updateClock(){const n=new Date(),h=String(n.getHours()).padStart(2,'0'),m=String(n.getMinutes()).padStart(2,'0'),s=String(n.getSeconds()).padStart(2,'0');const c=document.getElementById('clock'),d=document.getElementById('cdate');if(c)c.textContent=`${h}:${m}:${s}`;if(d){const mo=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'],dn=['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];d.textContent=`${dn[n.getDay()]} · ${n.getDate()} ${mo[n.getMonth()]} ${n.getFullYear()}`}}
setInterval(updateClock,1000);
render();
