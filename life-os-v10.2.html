<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life OS</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Life OS">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<style>
:root{--bg:#f0f0f8;--bg2:rgba(255,255,255,.65);--bg3:rgba(255,255,255,.4);--bg4:rgba(255,255,255,.25);--text:#2d2b3a;--text2:#6e6b7a;--text3:#a09dac;--border:rgba(255,255,255,.5);--accent:#6366f1;--accent-soft:rgba(99,102,241,.1);--accent-mid:#818cf8;--green:#10b981;--green-soft:rgba(16,185,129,.1);--amber:#f59e0b;--amber-soft:rgba(245,158,11,.1);--coral:#f43f5e;--coral-soft:rgba(244,63,94,.1);--blue:#3b82f6;--blue-soft:rgba(59,130,246,.1);--pink:#ec4899;--pink-soft:rgba(236,72,153,.1);--mono:'DM Mono',monospace;--sans:'DM Sans',-apple-system,sans-serif;--r:20px;--r-sm:14px;--glass:rgba(255,255,255,.55);--glass-border:rgba(255,255,255,.6);--glass-shadow:0 8px 32px rgba(100,80,160,.08),0 2px 8px rgba(100,80,160,.04);--blur:blur(20px) saturate(1.4)}
*{margin:0;padding:0;box-sizing:border-box}
body{color:var(--text);font-family:var(--sans);min-height:100vh;background:#e8e6f0;background:linear-gradient(135deg,#e9dff7 0%,#dde8fa 25%,#f0e6f0 50%,#ddf0ec 75%,#f2e8e0 100%);background-attachment:fixed}
body::before{content:'';position:fixed;top:-20%;right:-10%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(236,72,153,.12) 0%,transparent 70%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-10%;left:-10%;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.1) 0%,transparent 70%);pointer-events:none;z-index:0}
.app{max-width:1080px;margin:0 auto;padding:20px 16px;position:relative;z-index:1}

.tabs{display:flex;gap:3px;background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-radius:16px;padding:4px;margin-bottom:20px;width:fit-content;flex-wrap:wrap;border:1px solid var(--glass-border);box-shadow:var(--glass-shadow)}
.tab{padding:8px 16px;border-radius:12px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .25s;border:none;background:0 0;font-family:var(--sans)}
.tab.active{background:rgba(255,255,255,.8);color:var(--text);box-shadow:0 2px 8px rgba(100,80,160,.1)}.tab:hover:not(.active){color:var(--text);background:rgba(255,255,255,.3)}

.page{display:none}.page.active{display:block}

.char-card{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:var(--r);padding:22px 26px;margin-bottom:18px;box-shadow:var(--glass-shadow);display:flex;align-items:center;gap:20px}
.char-avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#a78bfa 0%,#818cf8 40%,#6366f1 100%);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:24px;font-weight:700;color:#fff;flex-shrink:0;box-shadow:0 4px 16px rgba(99,102,241,.25)}
.char-body{flex:1;min-width:0}.char-name{font-size:18px;font-weight:600;margin-bottom:1px}.char-class{font-size:12px;color:var(--text2);margin-bottom:10px}
.xp-row{display:flex;align-items:center;gap:10px}
.lv-badge{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--accent);background:var(--accent-soft);padding:3px 10px;border-radius:20px;border:1px solid rgba(99,102,241,.15);white-space:nowrap;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.xp-track{flex:1;height:8px;background:rgba(0,0,0,.06);border-radius:6px;overflow:hidden}
.xp-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#818cf8,#a78bfa,#c4b5fd);transition:width .6s cubic-bezier(.22,1,.36,1)}
.xp-label{font-family:var(--mono);font-size:11px;color:var(--text3);white-space:nowrap}
.stats-mini{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}.stat-mini{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px}.stat-dot{width:7px;height:7px;border-radius:50%}.stat-v{font-family:var(--mono);font-weight:600;color:var(--text)}

.pillars{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:18px}
@media(max-width:800px){.pillars{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:500px){.pillars{grid-template-columns:1fr}}
.pillar{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:var(--r);padding:18px;box-shadow:var(--glass-shadow);transition:transform .2s}
.pillar:hover{transform:translateY(-2px)}
.p-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}.p-title{font-size:12px;font-weight:600}.p-badge{font-family:var(--mono);font-size:10px;font-weight:500;padding:3px 10px;border-radius:12px}
.p-bar{width:100%;height:4px;background:rgba(0,0,0,.06);border-radius:3px;margin-bottom:12px}.p-bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.quests{display:flex;flex-direction:column;gap:5px}
.q{display:flex;align-items:center;gap:8px;padding:9px 12px;background:rgba(255,255,255,.5);border-radius:12px;cursor:pointer;transition:all .2s;border:1px solid rgba(255,255,255,.4);font-size:12px}
.q:hover{background:rgba(255,255,255,.8);border-color:rgba(255,255,255,.7);transform:translateY(-1px);box-shadow:0 2px 8px rgba(100,80,160,.06)}
.q.done{opacity:.4}.q.done .q-name{text-decoration:line-through}
.q-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--text3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;color:transparent;transition:all .2s;cursor:pointer}.q-check:hover{border-color:var(--accent);background:var(--accent-soft)}
.q.done .q-check{border-color:var(--green);background:var(--green);color:#fff;box-shadow:0 2px 8px rgba(16,185,129,.25)}
.q-name{flex:1}.q-xp{font-family:var(--mono);font-size:10px;color:var(--text3);font-weight:500}.q.done .q-xp{color:var(--green)}.q-time{font-family:var(--mono);font-size:9px;color:var(--text3);background:rgba(0,0,0,.04);padding:2px 6px;border-radius:6px}.q-menu{font-size:14px;color:var(--text3);cursor:pointer;padding:0 2px;opacity:0;transition:opacity .2s;line-height:1;user-select:none}.q:hover .q-menu{opacity:1}

.ai-section{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:var(--r);padding:18px;box-shadow:var(--glass-shadow);margin-bottom:18px}
.ai-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}.ai-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(16,185,129,.4)}.ai-dot.off{background:var(--text3);box-shadow:none}.ai-title{font-size:13px;font-weight:600}.ai-hint{font-size:11px;color:var(--text3);margin-left:auto}
.ai-messages{max-height:200px;overflow-y:auto;margin-bottom:12px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin}
.msg{padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;max-width:85%;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{background:linear-gradient(135deg,rgba(99,102,241,.15),rgba(167,139,250,.15));color:var(--accent);align-self:flex-end;margin-left:auto;border:1px solid rgba(99,102,241,.15)}
.msg.ai{background:rgba(255,255,255,.6);color:var(--text);align-self:flex-start;border:1px solid rgba(255,255,255,.5)}
.msg .ct{margin-top:8px;padding:8px 12px;background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.4);border-radius:12px;font-size:12px}.msg .ct-h{display:flex;align-items:center;justify-content:space-between}.msg .ct-n{font-weight:600}.msg .ct-x{font-family:var(--mono);font-weight:600;color:var(--green)}.msg .ct-m{color:var(--text3);font-size:11px;margin-top:2px}
.ai-input-row{display:flex;gap:8px}
.ai-input{flex:1;padding:10px 14px;border:1px solid rgba(255,255,255,.5);border-radius:14px;font-size:13px;font-family:var(--sans);background:rgba(255,255,255,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);outline:0;transition:all .2s}
.ai-input:focus{border-color:var(--accent);background:rgba(255,255,255,.7);box-shadow:0 0 0 3px rgba(99,102,241,.1)}.ai-input::placeholder{color:var(--text3)}
.ai-send{padding:10px 20px;background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;border:none;border-radius:14px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all .2s;box-shadow:0 4px 12px rgba(99,102,241,.2)}
.ai-send:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(99,102,241,.3)}.ai-send:disabled{opacity:.4;cursor:default;transform:none;box-shadow:none}

.no-key{padding:14px 18px;background:rgba(245,158,11,.08);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(245,158,11,.15);border-radius:14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:13px;color:#b45309}
.no-key button{margin-left:auto;padding:6px 14px;background:var(--amber);color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans);white-space:nowrap}

.card{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:var(--r);padding:18px;box-shadow:var(--glass-shadow);margin-bottom:18px}.card-title{font-size:13px;font-weight:600;margin-bottom:12px}

.macro-summary{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:16px}@media(max-width:500px){.macro-summary{grid-template-columns:repeat(3,1fr)}}
.mc{text-align:center;padding:14px 8px;background:rgba(255,255,255,.45);border-radius:16px;border:1px solid rgba(255,255,255,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.mc-v{font-family:var(--mono);font-size:18px;font-weight:700}.mc-l{font-size:10px;color:var(--text3);margin-top:2px}.mc-bar{height:3px;background:rgba(0,0,0,.06);border-radius:2px;margin-top:6px;overflow:hidden}.mc-bf{height:100%;border-radius:2px}

.food-entries{display:flex;flex-direction:column;gap:6px}.fe{display:flex;align-items:center;gap:12px;padding:10px 12px;background:rgba(255,255,255,.4);border-radius:14px;border:1px solid rgba(255,255,255,.4)}.fe-i{font-size:18px;flex-shrink:0}.fe-b{flex:1;min-width:0}.fe-n{font-size:13px;font-weight:500}.fe-m{font-size:11px;color:var(--text3);font-family:var(--mono)}.fe-k{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text2)}

.report-toggle{display:flex;gap:3px;background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:12px;padding:3px;margin-bottom:18px;width:fit-content}
.rt-btn{padding:6px 16px;border-radius:10px;font-size:12px;font-weight:500;border:none;background:0 0;cursor:pointer;font-family:var(--sans);color:var(--text2)}.rt-btn.active{background:rgba(255,255,255,.7);color:var(--text);box-shadow:0 2px 8px rgba(100,80,160,.08)}

.stat-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:18px}.food-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
.cg-wrap{display:grid;gap:4px}.cg-wrap .cg-row{display:grid;gap:4px;align-items:center}.cg-cell{border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;cursor:pointer;height:32px}.cg-label{font-size:11px;color:var(--text2);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.food-popup{position:fixed;z-index:9999;background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:var(--r-sm);padding:14px 18px;box-shadow:0 8px 32px rgba(0,0,0,.15);font-size:12px;line-height:1.6;pointer-events:none;max-width:220px}
.sc{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:var(--r);padding:22px;box-shadow:var(--glass-shadow);text-align:center;position:relative;overflow:hidden;transition:transform .2s}
.sc:hover{transform:translateY(-2px)}
.sc-emoji{font-size:32px;margin-bottom:8px}.sc-val{font-family:var(--mono);font-size:28px;font-weight:700;margin-bottom:2px}.sc-label{font-size:12px;color:var(--text2);margin-bottom:6px}.sc-comment{font-size:11px;font-weight:600;padding:3px 10px;border-radius:10px;display:inline-block}

.breakdown{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:var(--r);padding:18px;box-shadow:var(--glass-shadow);margin-bottom:18px}
.bd-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.04)}.bd-row:last-child{border:none}.bd-icon{font-size:16px;width:28px;text-align:center}.bd-name{font-size:13px;flex:1}.bd-bar-wrap{width:120px;height:6px;background:rgba(0,0,0,.06);border-radius:4px;overflow:hidden}.bd-bar-fill{height:100%;border-radius:4px}.bd-val{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text2);width:50px;text-align:right}.bd-fun{font-size:11px;color:var(--text3);width:140px;text-align:right}

.s-section{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:var(--r);padding:24px;box-shadow:var(--glass-shadow);margin-bottom:18px}
.s-title{font-size:15px;font-weight:600;margin-bottom:4px}.s-desc{font-size:12px;color:var(--text2);margin-bottom:20px;line-height:1.5}
.s-input-row{display:flex;gap:8px}
.s-input{flex:1;padding:10px 14px;border:1px solid rgba(255,255,255,.5);border-radius:14px;font-size:13px;font-family:var(--mono);background:rgba(255,255,255,.4);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);outline:0}.s-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.s-btn{padding:10px 20px;border-radius:14px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.5);color:var(--text);transition:all .2s;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.s-btn:hover{background:rgba(255,255,255,.7);transform:translateY(-1px)}.s-btn.primary{background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;border:none;box-shadow:0 4px 12px rgba(99,102,241,.2)}.s-btn.danger{color:var(--coral);border-color:rgba(244,63,94,.2);background:rgba(244,63,94,.05)}
.s-status{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:12px;font-size:12px;font-weight:500;margin-top:8px}.s-status.ok{background:var(--green-soft);color:var(--green)}.s-status.none{background:rgba(0,0,0,.04);color:var(--text3)}
.s-field{margin-bottom:16px}.s-field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px}
.s-field input{width:100%;padding:10px 14px;border:1px solid rgba(255,255,255,.5);border-radius:14px;font-size:13px;font-family:var(--sans);background:rgba(255,255,255,.4);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);outline:0;transition:all .2s}.s-field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.s-goals{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}.s-goals input{font-family:var(--mono);text-align:center}

.modal-overlay{position:fixed;inset:0;background:rgba(45,43,58,.35);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:rgba(255,255,255,.8);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--glass-border);border-radius:24px;padding:28px;width:360px;box-shadow:0 24px 48px rgba(100,80,160,.15),0 4px 12px rgba(100,80,160,.06);animation:modalIn .3s cubic-bezier(.22,1,.36,1)}
@keyframes modalIn{from{opacity:0;transform:scale(.9) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal h3{font-size:16px;font-weight:600;margin-bottom:4px}.modal p{font-size:12px;color:var(--text2);margin-bottom:18px}
.modal-input{width:100%;padding:12px 16px;border:1px solid rgba(255,255,255,.5);border-radius:14px;font-size:16px;font-family:var(--mono);text-align:center;background:rgba(255,255,255,.5);outline:0;margin-bottom:12px;transition:all .2s}.modal-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.modal-btns{display:flex;gap:10px}.modal-btn{flex:1;padding:12px;border-radius:14px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.5);color:var(--text);transition:all .2s}
.modal-btn:hover{background:rgba(255,255,255,.7)}.modal-btn.primary{background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;border:none;box-shadow:0 4px 12px rgba(99,102,241,.25)}

#travel-map{z-index:1;background:#dedede}#travel-map.leaflet-container{background:#dedede}#travel-map .leaflet-control-zoom{border:none;box-shadow:0 2px 8px rgba(0,0,0,.1)}#travel-map .leaflet-control-zoom a{background:rgba(255,255,255,.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:none;color:var(--text);width:32px;height:32px;line-height:32px;font-size:16px;border-radius:8px!important;margin-bottom:2px}
.lifeos-popup .leaflet-popup-content-wrapper{border-radius:16px;box-shadow:0 8px 24px rgba(100,80,160,.15);border:1px solid rgba(255,255,255,.6);background:rgba(255,255,255,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}.lifeos-popup .leaflet-popup-tip{background:rgba(255,255,255,.9)}.lifeos-popup .leaflet-popup-content{margin:14px 16px;font-family:var(--sans)}
.ch-card{padding:12px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--bg3);transition:all .25s;position:relative}
.ch-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(100,80,160,.1)}
.ch-card.locked{opacity:.55}.ch-card.locked:hover{opacity:.8}
.ch-card.active{background:var(--accent-soft);border-color:rgba(99,102,241,.2)}
.ch-card.completed{background:var(--amber-soft);border-color:rgba(192,139,45,.2);box-shadow:0 0 12px rgba(251,191,36,.2),0 0 4px rgba(251,191,36,.1);animation:goldenGlow 3s ease-in-out infinite}
@keyframes goldenGlow{0%,100%{box-shadow:0 0 8px rgba(251,191,36,.15)}50%{box-shadow:0 0 18px rgba(251,191,36,.35),0 0 4px rgba(251,191,36,.15)}}
.ch-card.custom::after{content:'✎';position:absolute;top:6px;right:8px;font-size:9px;color:var(--text3);opacity:.5}
.ch-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.ch-icon{font-size:22px}
.ch-badge{font-size:10px;font-weight:700;font-family:var(--mono);padding:2px 8px;border-radius:10px}
.ch-badge.active{background:var(--accent);color:#fff}.ch-badge.done{background:var(--amber);color:#fff}
.ch-name{font-size:12px;font-weight:600;margin-bottom:4px;line-height:1.3}
.ch-prog{height:5px;border-radius:4px;background:rgba(0,0,0,.06);overflow:hidden;margin-bottom:4px}
.ch-prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent-mid));transition:width .4s}
.ch-stat{font-size:10px;color:var(--text3);line-height:1.3}

function getKey(){return localStorage.getItem(KEY_S)||''}
function setKey(k){localStorage.setItem(KEY_S,k)}

async function callAI(sys,msg){
  // Try Supabase proxy first (no key needed), fallback to direct Gemini
  const useProxy=SUPABASE_FN_URL.indexOf('%%')===-1;
  if(useProxy){
    const r=await fetch(SUPABASE_FN_URL,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:sys,message:msg})
    });
    if(!r.ok){console.error('[AI proxy]',r.status);throw new Error('API_ERR')}
    const d=await r.json();
    return d.text||'';
  }
  // Direct Gemini (personal key)
  const k=getKey();if(!k)throw new Error('NO_KEY');
  const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent',{
    method:'POST',headers:{'Content-Type':'application/json','x-goog-api-key':k},
    body:JSON.stringify({system_instruction:{parts:[{text:sys}]},contents:[{parts:[{text:msg}]}],generationConfig:{temperature:0.3,maxOutputTokens:2048}})
  });
  if(!r.ok){console.error('[AI HTTP]',r.status);throw new Error(r.status===400||r.status===403?'BAD_KEY':'API_ERR')}
  const d=await r.json();
  if(!d.candidates||!d.candidates.length){console.warn('[AI no candidates]',d);return''}
  const txt=d.candidates[0]?.content?.parts?.[0]?.text||'';
  if(!txt)console.warn('[AI empty text]',d);
  return txt;
}

function startTimer(questId,questName,questCat){

  saveTimer();startTimerTick();tab='timer';render();

function pauseTimer(){
  if(!timerState.running)return;
  timerState.elapsed+=(Date.now()-timerState.startTime);
  timerState.paused=true;timerState.running=false;
  saveTimer();clearInterval(timerInterval);render();
}
function resumeTimer(){
  if(!timerState.paused)return;
  timerState.startTime=Date.now();timerState.running=true;timerState.paused=false;
  saveTimer();startTimerTick();render();
}
function stopTimer(){
  if(!timerState.running&&!timerState.paused)return;
  let total=timerState.elapsed;
  if(timerState.running)total+=(Date.now()-timerState.startTime);
  const mins=Math.max(1,Math.round(total/60000));
  const xp=calcXP(timerState.questCat,mins);
  // Accumulate on quest (don't mark done — allow restart)
  const q=st.quests.find(x=>x.id===timerState.questId);
  if(q){q.mins=(q.mins||0)+mins;q.xp=(q.xp||0)+xp;q.done=true;st.totalXP+=xp;st.history.push({id:q.id+'_'+Date.now(),name:q.name,cat:q.cat,xp,mins,ts:Date.now()});save()}
  // Log in timer
  timerState.log.push({name:timerState.questName,cat:timerState.questCat,mins,xp});
  timerState.running=false;timerState.paused=false;timerState.questId=null;
  saveTimer();clearInterval(timerInterval);render();
}
function cancelTimer(){
  timerState.running=false;timerState.paused=false;timerState.questId=null;
  saveTimer();clearInterval(timerInterval);render();
}
function startTimerTick(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(!timerState.running)return;
    const total=timerState.elapsed+(Date.now()-timerState.startTime);
    const el=document.getElementById('timer-display');
    if(el)el.textContent=formatMs(total);
    // Animate ring
    const ring=document.getElementById('timer-ring');
    if(ring){
      const circumference=2*Math.PI*100;
      const secInMin=Math.floor(total/1000)%60;
      ring.setAttribute('stroke-dashoffset',circumference-(secInMin/60)*circumference);
    }
    // Update tab indicator

  },500);
}
function formatMs(ms){
  const s=Math.floor(ms/1000);
  const h=Math.floor(s/3600);
  const m=Math.floor((s%3600)/60);
  const sec=s%60;
  return `${h>0?String(h).padStart(2,'0')+':':''}${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
function getCurrentTimerMs(){
  if(timerState.running)return timerState.elapsed+(Date.now()-timerState.startTime);
  if(timerState.paused)return timerState.elapsed;
  return 0;
}

function funTime(mins){
  if(mins<30)return 'как один TikTok-марафон';
  if(mins<60)return 'как серия сериала';
  const h=Math.round(mins/60);
  if(h<3)return `${h}ч — как полёт до Сочи`;
  if(h<6)return `${h}ч — почти рабочий день`;
  if(h<12)return `${h}ч — длиннее сна!`;
  if(h<24)return `${h}ч — целый день жизни`;
  const d=Math.round(h/24);
  if(d<3)return `${d} дн — мини-отпуск`;
  if(d<7)return `${d} дн — рабочая неделя`;
  return `${d} дн — это серьёзно!`;
}

function shiftFoodDay(dir){
  if(foodPickedDate){
    const d=new Date(foodPickedDate);d.setDate(d.getDate()+dir);
    const today=new Date().toISOString().slice(0,10);
    if(d.toISOString().slice(0,10)>today)return;
    foodPickedDate=d.toISOString().slice(0,10);
    if(foodPickedDate===today){foodPickedDate=null;foodDayOffset=0;}
  }else{
    foodDayOffset+=dir;
    if(foodDayOffset>0)foodDayOffset=0;
  }
  render();
}
function getFoodDayEntries(offset){
  if(offset===0&&!foodPickedDate)return st.food.entries;
  const d=foodPickedDate?new Date(foodPickedDate):new Date();
  if(!foodPickedDate)d.setDate(d.getDate()+offset);
  d.setHours(0,0,0,0);
  const ds=d.getTime(),de=ds+864e5;
  const raw=st.foodHistory.filter(e=>e.ts>=ds&&e.ts<de);
  // Deduplicate by name+kcal+ts (within 2sec window)
  const seen=[];
  return raw.filter(e=>{
    const dup=seen.find(s=>s.name===e.name&&Math.round(s.kcal)===Math.round(e.kcal)&&Math.abs(s.ts-e.ts)<2000);
    if(dup)return false;
    seen.push(e);return true;
  });
}

// ============ CHALLENGES ENGINE ============
function dayStart(d){const r=new Date(d);r.setHours(0,0,0,0);return r}
function daysAgo(n){const d=new Date();d.setDate(d.getDate()-n);d.setHours(0,0,0,0);return d.getTime()}
function isoWeek(d){const t=new Date(d);t.setHours(0,0,0,0);t.setDate(t.getDate()+3-(t.getDay()+6)%7);const y=new Date(t.getFullYear(),0,4);return t.getFullYear()*100+Math.round(((t-y)/864e5+y.getDay()+6)/7)}
function getAllChallenges(){return[...CHALLENGES,...(st.customChallenges||[])]}

function calcChallenge(ch){
  const now=Date.now(),cs=st.challenges[ch.id];
  switch(ch.type){
    case 'count':{
      const since=daysAgo(ch.period);
      const cur=st.history.filter(h=>ch.cats.includes(h.cat)&&h.ts>=since).length;
      return{current:cur,target:ch.target,pct:Math.min(100,Math.round(cur/ch.target*100))};}
    case 'hours':{
      const since=daysAgo(ch.period);
      const mins=st.history.filter(h=>ch.cats.includes(h.cat)&&h.ts>=since).reduce((s,h)=>s+(h.mins||0),0);
      const cur=Math.round(mins/60*10)/10;
      return{current:cur,target:ch.target,pct:Math.min(100,Math.round(cur/ch.target*100))};}
    case 'streak_daily':{
      let streak=0;
      for(let i=0;i<90;i++){const ds=daysAgo(i),de=daysAgo(i-1);
        if(st.history.some(h=>ch.cats.includes(h.cat)&&h.ts>=ds&&h.ts<de))streak++;else break;}
      return{current:streak,target:ch.target,pct:Math.min(100,Math.round(streak/ch.target*100))};}
    case 'streak_weekday':{
      let streak=0;
      for(let i=0;i<30;i++){const d=new Date();d.setDate(d.getDate()-i);
        if(d.getDay()===0||d.getDay()===6)continue;
        const ds=dayStart(d).getTime(),de=ds+864e5;
        if(st.history.some(h=>ch.cats.includes(h.cat)&&h.ts>=ds&&h.ts<de))streak++;else break;}
      return{current:streak,target:ch.target,pct:Math.min(100,Math.round(streak/ch.target*100))};}
    case 'streak_weekly':{
      const weekMap={};
      st.history.filter(h=>ch.cats.includes(h.cat)).forEach(h=>{const w=isoWeek(h.ts);weekMap[w]=(weekMap[w]||0)+1});
      let streak=0;
      for(let i=0;i<12;i++){const d=new Date();d.setDate(d.getDate()-i*7);const w=isoWeek(d);
        if((weekMap[w]||0)>=ch.weekTarget)streak++;else if(i===0)continue;else break;}
      return{current:streak,target:ch.weeks,pct:Math.min(100,Math.round(streak/ch.weeks*100))};}
    case 'food_streak':{
      let streak=0;
      for(let i=0;i<60;i++){const ds=daysAgo(i),de=daysAgo(i-1);
        const dayEntries=st.foodHistory.filter(h=>h.ts>=ds&&h.ts<de);
        if(dayEntries.length===0){if(i===0)continue;break}
        const total=dayEntries.reduce((s,e)=>s+(e[ch.field]||0),0);
        const goal=st.food.goals[ch.field]||0;if(!goal)break;
        if(ch.mode==='under'?total<=goal:total>=goal)streak++;else break;}
      return{current:streak,target:ch.target,pct:Math.min(100,Math.round(streak/ch.target*100))};}
    case 'media_count':{
      const since=daysAgo(ch.period);
      const cur=st.media.filter(m=>m.type===ch.mediaType&&m.ts>=since).length;
      return{current:cur,target:ch.target,pct:Math.min(100,Math.round(cur/ch.target*100))};}
    case 'all_pillars':{
      const mon=new Date();mon.setDate(mon.getDate()-(mon.getDay()+6)%7);mon.setHours(0,0,0,0);
      const pillars=new Set();
      st.history.filter(h=>h.ts>=mon.getTime()).forEach(h=>{const p=PMAP[h.cat];if(p&&p!=='other')pillars.add(p)});
      return{current:pillars.size,target:4,pct:Math.min(100,Math.round(pillars.size/4*100))};}
    case 'all_done_streak':{
      let streak=0;
      for(let i=0;i<60;i++){const ds=daysAgo(i),de=daysAgo(i-1);
        if(st.history.filter(h=>h.ts>=ds&&h.ts<de).length>0)streak++;else{if(i===0)continue;break}}
      return{current:streak,target:ch.target,pct:Math.min(100,Math.round(streak/ch.target*100))};}
    case 'streak_value':
      return{current:st.streak||0,target:ch.target,pct:Math.min(100,Math.round((st.streak||0)/ch.target*100))};
    case 'budget':{
      const n=new Date(),ms=new Date(n.getFullYear(),n.getMonth(),1).getTime(),me=new Date(n.getFullYear(),n.getMonth()+1,1).getTime();
      const exp={};st.money.entries.filter(e=>e.type==='expense'&&e.ts>=ms&&e.ts<me).forEach(e=>{exp[e.cat]=(exp[e.cat]||0)+e.amount});
      let over=0,total=0;for(const[c,l] of Object.entries(st.money.budgets||{})){total++;if((exp[c]||0)>l)over++}
      const ok=over===0&&total>0;
      return{current:ok?1:0,target:1,pct:ok?100:0,detail:over===0?'Все категории в бюджете':'Превышено: '+over+' кат.'};}
    case 'travel_count':{
      const since=daysAgo(ch.period);const cities=new Set();
      st.travel.filter(t=>!t.planned&&t.ts>=since&&t.city).forEach(t=>cities.add(t.city));
      return{current:cities.size,target:ch.target,pct:Math.min(100,Math.round(cities.size/ch.target*100))};}
    case 'deadline':{
      const now=Date.now();
      const done=ch.cats?st.history.some(h=>ch.cats.includes(h.cat)):false;
      const expired=ch.deadlineTs&&now>ch.deadlineTs;
      const daysLeft=ch.deadlineTs?Math.max(0,Math.ceil((ch.deadlineTs-now)/864e5)):0;
      return{current:done?1:0,target:1,pct:done?100:0,detail:done?'Выполнено!':expired?'Время вышло':'Осталось '+daysLeft+' дн.'};}
    case 'manual_count':{
      const cur=cs?.manualCount||0;
      return{current:cur,target:ch.target,pct:Math.min(100,Math.round(cur/ch.target*100))};}
    case 'manual_streak':{
      const days=(cs?.streakDays||[]).sort().reverse();
      let streak=0;const today=new Date().toISOString().slice(0,10);
      for(let i=0;i<ch.target+30;i++){
        const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().slice(0,10);
        if(days.includes(ds))streak++;else{if(i===0)continue;break}}
      return{current:streak,target:ch.target,pct:Math.min(100,Math.round(streak/ch.target*100))};}
    case 'manual_deadline':{
      const done=cs?.manualDone||false;
      const daysLeft=ch.deadlineTs?Math.max(0,Math.ceil((ch.deadlineTs-Date.now())/864e5)):0;
      return{current:done?1:0,target:1,pct:done?100:0,detail:done?'Выполнено!':'Осталось '+daysLeft+' дн.'};}
    default:return{current:0,target:1,pct:0};
  }
}

function getChStatus(id){return st.challenges[id]?.status||'locked'}
let chCollapsed=true;

let _checkingChallenges=false;
function checkChallenges(){
  if(_checkingChallenges)return false;
  _checkingChallenges=true;
  let completedCh=null;
  getAllChallenges().forEach(ch=>{
    if(getChStatus(ch.id)!=='active')return;
    const p=calcChallenge(ch);
    if(p.pct>=100){
      st.challenges[ch.id].status='completed';
      st.challenges[ch.id].completedTs=Date.now();
      if(!completedCh)completedCh=ch;
    }
  });
  _checkingChallenges=false;
  if(completedCh){save();showCelebration(completedCh);return true}
  return false;
}

// ---- INLINE WEEKLY TRACKER ----
let inlineWtOffset=0;
function renderInlineTracker(){
  if(!st.habits)st.habits=[];
  const habits=st.habits;

  const mon=new Date();mon.setDate(mon.getDate()-(mon.getDay()+6)%7+inlineWtOffset*7);mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(sun.getDate()+6);
  const days=[];for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(d.getDate()+i);days.push(d)}
  const dayNames=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  const today=new Date();today.setHours(0,0,0,0);

  if(habits.length===0){
    return`<div class="card" style="padding:20px;text-align:center">
      <div style="color:var(--text3);font-size:12px;margin-bottom:10px">Трекер привычек пока пуст</div>
      <button onclick="showCreateHabitModal()" style="background:var(--accent);color:#fff;border:none;border-radius:12px;padding:10px 22px;font-size:13px;font-weight:600;cursor:pointer">+ Создать трекер</button>
    </div>`;
  }

  let rows='';
  habits.forEach(h=>{
    const checks=h.checks||[];
    rows+=`<div class="wt-cell wt-name" onclick="showHabitMenu('${h.id}')" style="cursor:pointer"><span style="margin-right:3px">${h.icon}</span><span style="overflow:hidden;text-overflow:ellipsis">${h.name}</span></div>`;
    days.forEach(d=>{
      const dateStr=d.toISOString().slice(0,10);
      const isToday=d.getTime()===today.getTime();
      const ok=checks.includes(dateStr);
      if(isToday){
        rows+=`<div class="wt-cell"><div class="wt-dot ${ok?'done':'miss'}" onclick="toggleHabit('${h.id}','${dateStr}')" style="cursor:pointer">${ok?'✓':''}</div></div>`;
      }else{
        rows+=`<div class="wt-cell"><div class="wt-dot ${ok?'done':'inactive'}">${ok?'✓':''}</div></div>`;
      }
    });
  });

  return`<div class="card" style="padding:14px;overflow-x:auto">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <button onclick="inlineWtOffset--;render()" style="background:none;border:none;font-size:14px;cursor:pointer;padding:2px 6px;color:var(--text2)">◀</button>
      <div style="font-weight:600;font-size:13px">${mon.toLocaleDateString('ru-RU',{day:'numeric',month:'short'})} — ${sun.toLocaleDateString('ru-RU',{day:'numeric',month:'short'})}</div>
      <button onclick="inlineWtOffset=Math.min(0,inlineWtOffset+1);render()" style="background:none;border:none;font-size:14px;cursor:pointer;padding:2px 6px;color:var(--text2);${inlineWtOffset>=0?'opacity:.3':''}">▶</button>
    </div>
    <div class="wt-grid">
      <div class="wt-cell wt-head"></div>
      ${days.map((d,i)=>{const isToday=d.getTime()===today.getTime();return`<div class="wt-cell wt-head" style="${isToday?'color:var(--accent);font-weight:700':''}">${dayNames[i]}<br><span style="font-size:9px">${d.getDate()}</span></div>`}).join('')}
      ${rows}
    </div>
    <div style="text-align:center;margin-top:10px">
      <button onclick="showCreateHabitModal()" style="background:none;border:1px dashed var(--border);border-radius:10px;padding:6px 16px;font-size:11px;color:var(--text3);cursor:pointer">+ Добавить привычку</button>
    </div>
  </div>`;
}

function toggleStreakDay(id,dateStr){
  if(!st.challenges[id])st.challenges[id]={status:'active',acceptedTs:Date.now()};
  if(!st.challenges[id].streakDays)st.challenges[id].streakDays=[];
  const idx=st.challenges[id].streakDays.indexOf(dateStr);
  if(idx>=0)st.challenges[id].streakDays.splice(idx,1);
  else st.challenges[id].streakDays.push(dateStr);
  save();render();
}

// ---- HABIT TRACKER ----
function toggleHabit(id,dateStr){
  if(!st.habits)st.habits=[];
  const h=st.habits.find(h=>h.id===id);if(!h)return;
  if(!h.checks)h.checks=[];
  const idx=h.checks.indexOf(dateStr);
  if(idx>=0)h.checks.splice(idx,1);else h.checks.push(dateStr);
  save();render();

// ---- RENDER CHALLENGES (ACCORDION) ----
function renderChallenges(){
  const all=getAllChallenges();
  const activeCount=all.filter(c=>getChStatus(c.id)==='active').length;
  const doneCount=all.filter(c=>getChStatus(c.id)==='completed').length;
  const sorted=[...all].sort((a,b)=>{
    const ord={active:0,locked:1,completed:2};
    return(ord[getChStatus(a.id)]??1)-(ord[getChStatus(b.id)]??1);
  });
  return`<div class="card" style="padding-bottom:${chCollapsed?'16px':'16px'}">
    <div class="ch-header" onclick="chCollapsed=!chCollapsed;render()">
      <div class="card-title" style="margin:0">Челленджи</div>
      <span style="font-size:11px;color:var(--text3);font-family:var(--mono)">${activeCount} активн · ${doneCount} выполн</span>
      <div class="ch-actions" onclick="event.stopPropagation()">
        <button class="ch-act-btn" onclick="showCreateChallengeModal()" title="Создать челлендж">+</button>
      </div>
      <span class="ch-chevron ${chCollapsed?'':'open'}">▼</span>
    </div>
    <div class="ch-body ${chCollapsed?'':'open'}">
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;margin-top:12px">
        ${sorted.map(ch=>{
          const s=getChStatus(ch.id);
          const p=s!=='locked'?calcChallenge(ch):null;
          const isActive=s==='active',isDone=s==='completed';
          const customCls=ch.custom?' custom':'';
          return`<div class="ch-card ${s}${customCls}" onclick="showChallengeModal('${ch.id}')" style="cursor:pointer">
            <div class="ch-top"><span class="ch-icon">${ch.icon}</span>${isDone?'<span class="ch-badge done">✓</span>':isActive?'<span class="ch-badge active">'+p.pct+'%</span>':''}</div>
            <div class="ch-name">${ch.name}</div>
            ${isActive?`<div class="ch-prog"><div class="ch-prog-fill" style="width:${p.pct}%"></div></div><div class="ch-stat">${p.current} / ${p.target} ${ch.unit}</div>`:''}
            ${isDone?'<div class="ch-stat" style="color:var(--amber)">Выполнено!</div>':''}
            ${s==='locked'?'<div class="ch-stat">'+ch.desc+'</div>':''}
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

function dropChallenge(id){

// ---- MANUAL CHALLENGE ACTIONS ----
function manualIncrement(id){
  if(!st.challenges[id])st.challenges[id]={status:'active',acceptedTs:Date.now()};
  st.challenges[id].manualCount=(st.challenges[id].manualCount||0)+1;
  save();checkChallenges();document.querySelector('.modal-overlay').remove();render();
}
function manualCheckDay(id){
  if(!st.challenges[id])st.challenges[id]={status:'active',acceptedTs:Date.now()};
  const today=new Date().toISOString().slice(0,10);
  if(!st.challenges[id].streakDays)st.challenges[id].streakDays=[];
  if(!st.challenges[id].streakDays.includes(today))st.challenges[id].streakDays.push(today);
  save();checkChallenges();document.querySelector('.modal-overlay').remove();render();
}
function manualComplete(id){
  if(!st.challenges[id])st.challenges[id]={status:'active',acceptedTs:Date.now()};
  st.challenges[id].manualDone=true;
  save();checkChallenges();document.querySelector('.modal-overlay').remove();render();
}

function deleteCustomChallenge(id){
  if(!confirm('Удалить этот челлендж?'))return;
  st.customChallenges=st.customChallenges.filter(c=>c.id!==id);
  delete st.challenges[id];
  save();document.querySelector('.modal-overlay').remove();render();
}

// ---- WEEKLY TRACKER (full modal, habits only) ----
let wtWeekOffset=0;
function showWeeklyTracker(){
  if(!st.habits||st.habits.length===0){alert('Нет трекеров привычек');return}
  const o=document.createElement('div');o.className='modal-overlay';
  o.innerHTML=`<div class="modal" style="width:95vw;max-width:640px;max-height:85vh;overflow-y:auto;padding:20px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <button onclick="wtWeekOffset--;updateWT()" style="background:none;border:none;font-size:18px;cursor:pointer;padding:4px 8px">◀</button>
      <div style="font-weight:600;font-size:14px" id="wt-title"></div>
      <button onclick="wtWeekOffset++;updateWT()" style="background:none;border:none;font-size:18px;cursor:pointer;padding:4px 8px" id="wt-next">▶</button>
    </div>
    <div id="wt-body"></div>
    <div class="modal-btns" style="margin-top:14px"><button class="modal-btn" onclick="wtWeekOffset=0;this.closest('.modal-overlay').remove()" style="flex:1">Закрыть</button></div>
  </div>`;
  document.body.appendChild(o);
  updateWT();
}

function updateWT(){
  const mon=new Date();mon.setDate(mon.getDate()-(mon.getDay()+6)%7+wtWeekOffset*7);mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(sun.getDate()+6);
  const nextBtn=document.getElementById('wt-next');
  if(nextBtn)nextBtn.disabled=wtWeekOffset>=0;
  document.getElementById('wt-title').textContent=mon.toLocaleDateString('ru-RU',{day:'numeric',month:'short'})+' — '+sun.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
  const days=[];for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(d.getDate()+i);days.push(d)}
  const dayNames=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  const today=new Date();today.setHours(0,0,0,0);
  const habits=st.habits||[];

  let html=`<div class="wt-grid">
    <div class="wt-cell wt-head"></div>
    ${days.map((d,i)=>{
      const isToday=d.getTime()===today.getTime();
      return`<div class="wt-cell wt-head" style="${isToday?'color:var(--accent);font-weight:700':''}">${dayNames[i]}<br><span style="font-size:9px">${d.getDate()}</span></div>`;
    }).join('')}`;

  habits.forEach(h=>{
    const checks=h.checks||[];
    html+=`<div class="wt-cell wt-name"><span style="margin-right:3px">${h.icon}</span>${h.name}</div>`;
    days.forEach(d=>{
      const dateStr=d.toISOString().slice(0,10);
      const isToday=d.getTime()===today.getTime();
      const ok=checks.includes(dateStr);
      if(isToday){
        html+=`<div class="wt-cell"><div class="wt-dot ${ok?'done':'miss'}" onclick="toggleHabit('${h.id}','${dateStr}');updateWT()" style="cursor:pointer">${ok?'✓':''}</div></div>`;
      }else{
        html+=`<div class="wt-cell"><div class="wt-dot ${ok?'done':'inactive'}">${ok?'✓':''}</div></div>`;
      }
    });
  });
  html+=`</div>`;
  document.getElementById('wt-body').innerHTML=html;
}

function renderReport(){
  const days=reportMode==='week'?7:30;
  const label=reportMode==='week'?'Неделя':'Месяц';
  const labelGen=reportMode==='week'?'неделю':'месяц';
  const hist=getHistoryRange(days);
  const prevHist=getHistoryRange(days*2).filter(q=>q.ts<Date.now()-days*86400000);
  const foodH=getFoodRange(days);
  const prevFoodH=getFoodRange(days*2).filter(e=>e.ts<Date.now()-days*86400000);

  if(hist.length===0&&foodH.length===0&&!st.money.entries.length&&!st.media.length){
    return`<div class="card" style="text-align:center;padding:40px;color:var(--text3)"><div style="font-size:32px;margin-bottom:8px">📊</div><div style="font-size:14px">Пока нет данных за ${label.toLowerCase()}у</div><div style="font-size:12px;margin-top:4px">Закрывай задания — статистика появится тут</div></div>`;
  }

  const restCats=new Set(['rest','gaming','social','hobby']);
  const activeMins=hist.filter(q=>!restCats.has(q.cat)).reduce((s,q)=>s+q.mins,0);
  const restMins=hist.filter(q=>restCats.has(q.cat)).reduce((s,q)=>s+q.mins,0);
  const prevActiveMins=prevHist.filter(q=>!restCats.has(q.cat)).reduce((s,q)=>s+q.mins,0);
  const totalXP=hist.reduce((s,q)=>s+q.xp,0);
  const prevXP=prevHist.reduce((s,q)=>s+q.xp,0);
  const totalQuests=hist.length;
  const rank=rankTitle(activeMins);

  // Delta helper
  function delta(cur,prev,unit='',inv=false){
    if(!prev)return'';
    const diff=cur-prev;
    if(diff===0)return`<span style="color:var(--text3);font-size:10px">= пр. ${labelGen.slice(0,-1)}я</span>`;
    const up=diff>0;
    const good=inv?!up:up;
    const col=good?'var(--green)':'var(--coral)';
    const arrow=up?'↑':'↓';
    return`<span style="color:${col};font-size:10px;font-weight:600">${arrow} ${Math.abs(Math.round(diff))}${unit}</span>`;
  }

  // Per-category breakdown
  const byCat={};
  hist.forEach(q=>{if(!byCat[q.cat])byCat[q.cat]={mins:0,xp:0,count:0};byCat[q.cat].mins+=q.mins;byCat[q.cat].xp+=q.xp;byCat[q.cat].count++});
  const activeCats=Object.entries(byCat).filter(([c])=>!restCats.has(c)).sort((a,b)=>b[1].mins-a[1].mins);
  const restCatsArr=Object.entries(byCat).filter(([c])=>restCats.has(c)).sort((a,b)=>b[1].mins-a[1].mins);
  const maxCatMins=Math.max(...Object.values(byCat).map(d=>d.mins),1);

  // Per-pillar
  const pillarMins={career:0,skills:0,body:0,rest:0};
  hist.forEach(q=>{const p=PMAP[q.cat]||'other';if(pillarMins[p]!==undefined)pillarMins[p]+=q.mins});

  // ===== DAILY CHART DATA =====
  const dayMap={};
  const kcalDayMap={};
  for(let i=days-1;i>=0;i--){
    const d=new Date(Date.now()-i*86400000);
    const key=d.toISOString().slice(0,10);
    dayMap[key]={active:0,rest:0,xp:0,quests:0};
    kcalDayMap[key]=0;
  }
  hist.forEach(q=>{
    const key=new Date(q.ts).toISOString().slice(0,10);
    if(dayMap[key]){
      dayMap[key].quests++;dayMap[key].xp+=q.xp;
      if(restCats.has(q.cat))dayMap[key].rest+=q.mins;else dayMap[key].active+=q.mins;
    }
  });
  foodH.forEach(e=>{
    const key=new Date(e.ts).toISOString().slice(0,10);
    if(kcalDayMap[key]!==undefined)kcalDayMap[key]+=e.kcal;
  });
  const dayKeys=Object.keys(dayMap);
  const maxDayMins=Math.max(...dayKeys.map(k=>dayMap[k].active+dayMap[k].rest),1);
  const maxDayKcal=Math.max(...Object.values(kcalDayMap),1);

  // Best/worst days
  let bestDay=dayKeys[0],worstDay=dayKeys[0];
  dayKeys.forEach(k=>{
    if(dayMap[k].active>dayMap[bestDay].active)bestDay=k;
    if(dayMap[k].active<dayMap[worstDay].active)worstDay=k;
  });
  const fmtDay=k=>{const d=new Date(k+'T12:00:00');return d.toLocaleDateString('ru',{weekday:'short',day:'numeric',month:'short'})};

  // Streak & consistency
  const daysWithQuests=dayKeys.filter(k=>dayMap[k].quests>0).length;
  const consistencyPct=Math.round(daysWithQuests/days*100);

  // ===== HEATMAP =====
  function renderHeatmap(){
    const cols=days<=7?7:Math.min(dayKeys.length,days);
    const rows=days<=7?1:Math.ceil(dayKeys.length/7);
    const size=days<=7?40:18;
    const gap=3;
    let cells='';
    dayKeys.forEach((k,i)=>{
      const mins=dayMap[k].active;
      const opacity=maxDayMins?Math.max(0.08,mins/maxDayMins):0.08;
      const x=days<=7?i*(size+gap):(i%7)*(size+gap);
      const y=days<=7?0:Math.floor(i/7)*(size+gap);
      const dayLabel=new Date(k+'T12:00:00').toLocaleDateString('ru',{weekday:'short',day:'numeric'});
      cells+=`<rect x="${x}" y="${y}" width="${size}" height="${size}" rx="4" fill="var(--accent)" opacity="${opacity}" title="${dayLabel}: ${mins}м"><title>${dayLabel}: ${mins}м</title></rect>`;
    });
    const w=days<=7?cols*(size+gap)-gap:7*(size+gap)-gap;
    const h=days<=7?size:rows*(size+gap)-gap;
    return`<svg width="100%" viewBox="0 0 ${w} ${h}" style="max-width:${w}px">${cells}</svg>`;
  }

  // ===== BAR CHART (daily productivity) =====
  function renderDailyBars(){
    const barW=Math.max(8,Math.min(28,Math.floor(600/dayKeys.length)-4));
    const chartH=120;
    let bars='';
    dayKeys.forEach((k,i)=>{
      const active=dayMap[k].active;
      const rest=dayMap[k].rest;
      const total=active+rest;
      const h=maxDayMins?Math.round(total/maxDayMins*chartH):0;
      const ah=total?Math.round(active/total*h):0;
      const rh=h-ah;
      const x=i*(barW+4);
      const dayLabel=new Date(k+'T12:00:00').toLocaleDateString('ru',{weekday:'short'});
      bars+=`<g>
        <rect x="${x}" y="${chartH-h}" width="${barW}" height="${ah}" rx="3" fill="var(--accent)" opacity="0.8"><title>${dayLabel}: ${active}м продуктивно</title></rect>
        <rect x="${x}" y="${chartH-rh}" width="${barW}" height="${rh}" rx="3" fill="var(--pink)" opacity="0.5"><title>${dayLabel}: ${rest}м отдых</title></rect>
        <text x="${x+barW/2}" y="${chartH+14}" text-anchor="middle" font-size="9" fill="var(--text3)" font-family="var(--sans)">${dayLabel.slice(0,2)}</text>
      </g>`;
    });
    const w=dayKeys.length*(barW+4);
    return`<div style="overflow-x:auto"><svg width="${w}" height="${chartH+20}" viewBox="0 0 ${w} ${chartH+20}">${bars}</svg></div>`;
  }

  // ===== KCAL CHART =====
  function renderKcalChart(){
    if(!foodH.length)return'';
    const barW=Math.max(8,Math.min(28,Math.floor(600/dayKeys.length)-4));
    const chartH=80;
    const goal=st.food.goals?.kcal||2000;
    const goalY=chartH-Math.round(goal/maxDayKcal*chartH);
    let bars='';
    dayKeys.forEach((k,i)=>{
      const kcal=kcalDayMap[k];
      const h=maxDayKcal?Math.round(kcal/maxDayKcal*chartH):0;
      const x=i*(barW+4);
      const over=kcal>goal;
      const dayLabel=new Date(k+'T12:00:00').toLocaleDateString('ru',{weekday:'short'});
      bars+=`<rect x="${x}" y="${chartH-h}" width="${barW}" height="${h}" rx="3" fill="${over?'var(--coral)':'var(--green)'}" opacity="0.7"><title>${dayLabel}: ${Math.round(kcal)} ккал</title></rect>`;
      bars+=`<text x="${x+barW/2}" y="${chartH+14}" text-anchor="middle" font-size="9" fill="var(--text3)" font-family="var(--sans)">${dayLabel.slice(0,2)}</text>`;
    });
    const w=dayKeys.length*(barW+4);
    bars+=`<line x1="0" y1="${goalY}" x2="${w}" y2="${goalY}" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.6"/>`;
    bars+=`<text x="${w-4}" y="${goalY-4}" text-anchor="end" font-size="9" fill="var(--accent)" font-family="var(--mono)">${goal} ккал</text>`;
    return`<div style="overflow-x:auto"><svg width="${w}" height="${chartH+20}" viewBox="0 0 ${w} ${chartH+20}">${bars}</svg></div>`;
  }

  // ===== FOOD SECTION =====
  function renderFoodSection(){
    if(!foodH.length)return'';
    const g=st.food.goals||{kcal:2200,protein:150,fat:70,carbs:250,fiber:30,sugar:50};

    // Aggregate per day
    const fdMap={};
    dayKeys.forEach(k=>{fdMap[k]={kcal:0,protein:0,fat:0,carbs:0,fiber:0,sugar:0}});
    foodH.forEach(e=>{
      const k=new Date(e.ts).toISOString().slice(0,10);
      if(fdMap[k]){fdMap[k].kcal+=e.kcal;fdMap[k].protein+=e.protein;fdMap[k].fat+=e.fat;fdMap[k].carbs+=e.carbs;fdMap[k].fiber+=(e.fiber||0);fdMap[k].sugar+=(e.sugar||0)}
    });
    const daysWithFood=dayKeys.filter(k=>fdMap[k].kcal>0);
    const dc=daysWithFood.length||1;

    // Averages (only days with food)
    const avg={kcal:0,protein:0,fat:0,carbs:0,fiber:0,sugar:0};
    daysWithFood.forEach(k=>{avg.kcal+=fdMap[k].kcal;avg.protein+=fdMap[k].protein;avg.fat+=fdMap[k].fat;avg.carbs+=fdMap[k].carbs;avg.fiber+=fdMap[k].fiber;avg.sugar+=fdMap[k].sugar});
    Object.keys(avg).forEach(k=>avg[k]=Math.round(avg[k]/dc));

    function pctOf(val,goal){return goal?Math.round(val/goal*100):0}
    function pctColor(pct,field){
      if(field==='sugar')return pct<=100?'var(--green)':'var(--coral)';
      if(field==='kcal')return pct>=85&&pct<=115?'var(--green)':pct<85?'var(--amber)':'var(--coral)';
      return pct>=80&&pct<=120?'var(--green)':pct<80?'var(--amber)':'var(--coral)';
    }

    const metrics=[
      {key:'kcal',name:'Ккал',icon:'🔥',goal:g.kcal,lo:0.85,hi:1.15},
      {key:'protein',name:'Белок',icon:'🥩',goal:g.protein,lo:0.8,hi:1.3},
      {key:'fat',name:'Жиры',icon:'🧈',goal:g.fat,lo:0.8,hi:1.2},
      {key:'carbs',name:'Углев',icon:'🍞',goal:g.carbs,lo:0.8,hi:1.2},
      {key:'fiber',name:'Клетч',icon:'🥦',goal:g.fiber,lo:0.8,hi:2},
      {key:'sugar',name:'Сахар',icon:'🍬',goal:g.sugar||50,lo:0,hi:1}
    ];

    // Store fdMap globally for popup access
    window._foodCG={fdMap,metrics,goals:g};

    // CSS Grid compliance grid — cols adapt to container
    const nDays=dayKeys.length;
    const gridCols=`56px repeat(${nDays},1fr)`;

    function complianceGrid(){
      // Day header row
      let headerCells=`<div></div>`;
      dayKeys.forEach(k=>{
        headerCells+=`<div style="text-align:center;font-size:10px;color:var(--text3);padding-bottom:2px">${new Date(k+'T12:00:00').toLocaleDateString('ru',{weekday:'short'}).slice(0,2)}</div>`;
      });

      let rows=`<div class="cg-row" style="grid-template-columns:${gridCols}">${headerCells}</div>`;

      metrics.forEach((m,mi)=>{
        let cells=`<div class="cg-label">${m.icon} ${m.name}</div>`;
        dayKeys.forEach((k,di)=>{
          const v=fdMap[k][m.key];
          const hasFood=fdMap[k].kcal>0;
          if(!hasFood){
            cells+=`<div class="cg-cell" style="background:var(--bg);border:1px solid var(--border);color:transparent">-</div>`;
            return;
          }
          const ratio=m.goal?v/m.goal:0;
          const ok=ratio>=m.lo&&ratio<=m.hi;
          const bg=ok?'var(--green)':'var(--coral)';
          cells+=`<div class="cg-cell" style="background:${bg}22;color:${bg}" onclick="showFoodCGPopup(event,${mi},'${k}')">${ok?'✓':'✗'}</div>`;
        });
        rows+=`<div class="cg-row" style="grid-template-columns:${gridCols}">${cells}</div>`;
      });
      return`<div class="cg-wrap">${rows}</div>`;
    }

    // Top products
    const byName={};
    foodH.forEach(e=>{
      if(!byName[e.name])byName[e.name]={count:0,kcal:0,icon:e.icon||'🍽️'};
      byName[e.name].count++;byName[e.name].kcal+=e.kcal;
    });
    const byFreq=Object.entries(byName).sort((a,b)=>b[1].count-a[1].count);
    const maxFreq=byFreq.length?byFreq[0][1].count:1;

    return`
    <!-- Avg daily cards -->
    <div class="food-cards">
      ${metrics.map(m=>{
        const val=avg[m.key];const pct=pctOf(val,m.goal);
        return`<div class="sc"><div class="sc-emoji">${m.icon}</div><div class="sc-val" style="color:${pctColor(pct,m.key)}">${val}${m.key==='kcal'?'':'г'}</div><div class="sc-label">${m.name}/день</div><div class="sc-comment" style="background:${pctColor(pct,m.key)}18;color:${pctColor(pct,m.key)}">${pct}% от ${m.goal}${m.key==='kcal'?'':'г'}</div></div>`;
      }).join('')}
    </div>

    <!-- Daily compliance grid -->
    <div class="card" style="margin-bottom:18px">
      <div class="card-title">Попадание в цели по дням</div>
      <div style="display:flex;gap:12px;font-size:11px;margin-bottom:12px"><span style="color:var(--green)">✓ норма</span><span style="color:var(--coral)">✗ мимо</span><span style="color:var(--text3)">□ нет данных</span></div>
      ${complianceGrid()}
    </div>

    ${byFreq.length?`<div class="breakdown"><div style="font-size:13px;font-weight:600;margin-bottom:12px">🏆 Топ продуктов</div>
      ${byFreq.slice(0,7).map(([name,d],i)=>`<div class="bd-row"><div class="bd-icon">${i<3?['🥇','🥈','🥉'][i]:d.icon}</div><div class="bd-name">${name}</div><div class="bd-bar-wrap"><div class="bd-bar-fill" style="width:${Math.round(d.count/maxFreq*100)}%;background:var(--coral)"></div></div><div class="bd-val">${d.count}×</div><div class="bd-fun">${Math.round(d.kcal)} ккал</div></div>`).join('')}
    </div>`:''}`;
  }

  // ===== MONEY SECTION =====
  function renderMoneySection(){
    const cutoff=Date.now()-days*86400000;
    const entries=st.money.entries.filter(e=>e.ts>=cutoff);
    if(!entries.length)return'';
    const prevEntries=st.money.entries.filter(e=>e.ts>=cutoff-days*86400000&&e.ts<cutoff);
    const expenses=entries.filter(e=>e.type==='expense');
    const income=entries.filter(e=>e.type==='income');
    const totalExp=expenses.reduce((s,e)=>s+e.amount,0);
    const totalInc=income.reduce((s,e)=>s+e.amount,0);
    const prevExp=prevEntries.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
    const prevInc=prevEntries.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
    const byCat={};
    expenses.forEach(e=>{if(!byCat[e.cat])byCat[e.cat]=0;byCat[e.cat]+=e.amount});
    const catArr=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
    const maxCat=catArr.length?catArr[0][1]:1;
    const totalBudget=Object.values(st.money.budgets).reduce((s,v)=>s+v,0);
    const budgetPct=totalBudget?Math.round(totalExp/totalBudget*100):0;

    return`
    <div class="stat-cards">
      <div class="sc"><div class="sc-emoji">💸</div><div class="sc-val" style="color:var(--coral)">${Math.round(totalExp).toLocaleString()}</div><div class="sc-label">Расходы ${delta(totalExp,prevExp,'',true)}</div><div class="sc-comment" style="background:var(--coral-soft);color:var(--coral)">${expenses.length} операций</div></div>
      <div class="sc"><div class="sc-emoji">💰</div><div class="sc-val" style="color:var(--green)">${Math.round(totalInc).toLocaleString()}</div><div class="sc-label">Доходы ${delta(totalInc,prevInc,'')}</div><div class="sc-comment" style="background:var(--green-soft);color:var(--green)">${totalInc-totalExp>=0?'+':''}${Math.round(totalInc-totalExp).toLocaleString()} баланс</div></div>
      ${totalBudget?`<div class="sc"><div class="sc-emoji">${budgetPct>100?'🚨':budgetPct>80?'⚠️':'✅'}</div><div class="sc-val" style="color:${budgetPct>100?'var(--coral)':budgetPct>80?'var(--amber)':'var(--green)'}">${budgetPct}%</div><div class="sc-label">Бюджета использовано</div><div class="sc-comment" style="background:${budgetPct>100?'var(--coral-soft)':budgetPct>80?'var(--amber-soft)':'var(--green-soft)'};color:${budgetPct>100?'var(--coral)':budgetPct>80?'var(--amber)':'var(--green)'}">${Math.round(totalExp).toLocaleString()} / ${Math.round(totalBudget).toLocaleString()}</div></div>`:''}
    </div>
    ${catArr.length?`<div class="breakdown"><div style="font-size:13px;font-weight:600;margin-bottom:12px">📂 Расходы по категориям</div>
      ${catArr.map(([cat,amount])=>`<div class="bd-row"><div class="bd-icon">${moneyCatIcon(cat)}</div><div class="bd-name">${moneyCatName(cat)}</div><div class="bd-bar-wrap"><div class="bd-bar-fill" style="width:${Math.round(amount/maxCat*100)}%;background:var(--coral)"></div></div><div class="bd-val">${Math.round(amount).toLocaleString()}</div><div class="bd-fun">${Math.round(amount/totalExp*100)}%</div></div>`).join('')}
    </div>`:''}`;
  }

  // ===== MEDIA SECTION =====
  function renderMediaSection(){
    const cutoff=Date.now()-days*86400000;
    const recent=st.media.filter(m=>m.ts>=cutoff);
    if(!recent.length)return'';
    const byType={};
    recent.forEach(m=>{if(!byType[m.type])byType[m.type]={count:0,totalRating:0};byType[m.type].count++;byType[m.type].totalRating+=m.rating});
    const avgRating=recent.length?Math.round(recent.reduce((s,m)=>s+m.rating,0)/recent.length*10)/10:0;
    const typeEmoji={movie:'🎬',book:'📚',game:'🎮',series:'📺'};
    const typeName={movie:'Фильмы',book:'Книги',game:'Игры',series:'Сериалы'};
    const top=recent.filter(m=>m.rating>=8).sort((a,b)=>b.rating-a.rating);

    return`
    <div class="stat-cards">
      <div class="sc"><div class="sc-emoji">🎯</div><div class="sc-val" style="color:var(--accent)">${recent.length}</div><div class="sc-label">Медиа за ${labelGen}</div><div class="sc-comment" style="background:var(--accent-soft);color:var(--accent)">средняя оценка ${avgRating}/10</div></div>
      ${Object.entries(byType).map(([type,d])=>`<div class="sc"><div class="sc-emoji">${typeEmoji[type]||'📀'}</div><div class="sc-val" style="color:var(--blue)">${d.count}</div><div class="sc-label">${typeName[type]||type}</div><div class="sc-comment" style="background:var(--blue-soft);color:var(--blue)">${(d.totalRating/d.count).toFixed(1)}/10</div></div>`).join('')}
    </div>
    ${top.length?`<div class="breakdown"><div style="font-size:13px;font-weight:600;margin-bottom:12px">⭐ Лучшее за ${labelGen}</div>
      ${top.slice(0,5).map(m=>`<div class="bd-row"><div class="bd-icon">${typeEmoji[m.type]||'📀'}</div><div class="bd-name">${m.name}</div><div class="bd-val" style="color:var(--amber)">${m.rating}/10</div></div>`).join('')}
    </div>`:''}`;
  }

  // ===== TRAVEL SECTION =====
  function renderTravelSection(){
    const cutoff=Date.now()-days*86400000;
    const recent=st.travel.filter(t=>{
      if(t.dateFrom){const d=new Date(t.dateFrom).getTime();return d>=cutoff&&d<=Date.now()}
      return t.ts>=cutoff;
    });
    if(!recent.length)return'';
    return`<div class="card" style="margin-bottom:18px"><div class="card-title">✈️ Путешествия за ${labelGen}</div>
      ${recent.map(t=>`<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.04)"><div style="font-size:20px">${t.planned?'✈️':'📍'}</div><div style="flex:1"><div style="font-size:13px;font-weight:600">${t.country}${t.city?' · '+t.city:''}</div>${t.dateFrom?`<div style="font-size:11px;color:var(--text3)">${t.dateFrom}${t.dateTo?' — '+t.dateTo:''}</div>`:''}</div></div>`).join('')}
    </div>`;
  }

  // ===== ACHIEVEMENTS SECTION =====
  function renderAchievementsSection(){
    const cutoff=Date.now()-days*86400000;
    const recent=(st.achievements||[]).filter(a=>a.ts>=cutoff);
    if(!recent.length)return'';
    return`<div class="card" style="margin-bottom:18px"><div class="card-title">🏅 Достижения за ${labelGen}</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">
        ${recent.map(a=>`<div style="padding:8px 14px;background:var(--accent-soft);border-radius:var(--r-sm);font-size:12px;font-weight:600;color:var(--accent)">${a.icon||'🏆'} ${a.name}</div>`).join('')}
      </div>
    </div>`;
  }

  // ===== AI SUMMARY =====
  function renderAISummaryBtn(){
    return`<div class="card" style="text-align:center;padding:20px;margin-bottom:18px;cursor:pointer" onclick="generateAIReport()" id="ai-report-card">
      <div style="font-size:24px;margin-bottom:8px">🤖</div>
      <div style="font-size:14px;font-weight:600">AI-резюме за ${labelGen}</div>
      <div style="font-size:12px;color:var(--text3);margin-top:4px">Нажми для персонального анализа от Gemini</div>
      <div id="ai-report-result" style="margin-top:12px;text-align:left;font-size:13px;line-height:1.6;display:none"></div>
    </div>`;
  }

  // ===== ASSEMBLE =====
  let html='';

  // 1. Best/worst day
  if(hist.length>1){

  // 5. Category breakdown (unified)
  if(Object.keys(byCat).length){
    html+=`<div class="breakdown">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:13px;font-weight:600">📊 По категориям</div><div style="display:flex;gap:14px;font-size:12px;color:var(--text2)"><span>⚡ ${totalXP} XP</span><span>✅ ${totalQuests} заданий</span></div></div>
      ${Object.entries(byCat).sort((a,b)=>b[1].mins-a[1].mins).map(([cat,d])=>`<div class="bd-row"><div class="bd-icon">${catEmoji(cat)}</div><div class="bd-name">${catName(cat)}</div><div class="bd-bar-wrap"><div class="bd-bar-fill" style="width:${Math.round(d.mins/maxCatMins*100)}%;background:${restCats.has(cat)?'var(--pink)':'var(--accent)'}"></div></div><div class="bd-val">${d.mins>=60?Math.round(d.mins/60)+'ч':d.mins+'м'}</div><div class="bd-fun">${d.count} заданий</div></div>`).join('')}
    </div>`;
  }

  // 6. Pillars
  if(hist.length){
    const pArr=[['💼','Карьера',pillarMins.career,'var(--accent)'],['📘','Скиллы',pillarMins.skills,'var(--blue)'],['🏃','Тело',pillarMins.body,'var(--green)'],['🛋️','Отдых',pillarMins.rest,'var(--pink)']];
    const maxP=Math.max(...pArr.map(p=>p[2]),1);
    html+=`<div class="breakdown">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px">🏛️ Столпы жизни</div>
      ${pArr.map(([icon,name,mins,col])=>`<div class="bd-row"><div class="bd-icon">${icon}</div><div class="bd-name">${name}</div><div class="bd-bar-wrap"><div class="bd-bar-fill" style="width:${Math.round(mins/maxP*100)}%;background:${col}"></div></div><div class="bd-val">${mins>=60?Math.round(mins/60)+'ч':mins+'м'}</div></div>`).join('')}
    </div>`;
  }

  // 7. Food
  html+=`<div style="margin-top:8px"><div class="card-title" style="font-size:15px;margin-bottom:14px;padding-left:2px">🍽️ Питание</div></div>`;
  html+=renderFoodSection()||`<div class="card" style="text-align:center;padding:20px;color:var(--text3);margin-bottom:18px"><div style="font-size:12px">Нет данных по еде за ${labelGen}</div></div>`;

  // 8. Money
  html+=`<div style="margin-top:8px"><div class="card-title" style="font-size:15px;margin-bottom:14px;padding-left:2px">💰 Финансы</div></div>`;
  html+=renderMoneySection()||`<div class="card" style="text-align:center;padding:20px;color:var(--text3);margin-bottom:18px"><div style="font-size:12px">Нет финансовых данных за ${labelGen}</div></div>`;

  // 9. Media
  const mediaSec=renderMediaSection();
  if(mediaSec){
    html+=`<div style="margin-top:8px"><div class="card-title" style="font-size:15px;margin-bottom:14px;padding-left:2px">🎬 Медиа</div></div>`;
    html+=mediaSec;
  }

  // 10. Travel
  html+=renderTravelSection();

  // 11. Achievements
  html+=renderAchievementsSection();

  // 12. AI Summary
  html+=renderAISummaryBtn();

  return html;
}

// ============ FOOD COMPLIANCE POPUP ============
function showFoodCGPopup(e,mi,dayKey){
  e.stopPropagation();
  // Remove existing
  document.querySelectorAll('.food-popup').forEach(el=>el.remove());
  const cg=window._foodCG;if(!cg)return;
  const m=cg.metrics[mi];
  const d=cg.fdMap[dayKey];
  if(!d)return;
  const v=Math.round(d[m.key]);
  const ratio=m.goal?v/m.goal:0;
  const ok=ratio>=m.lo&&ratio<=m.hi;
  const pct=Math.round(ratio*100);
  const dayLabel=new Date(dayKey+'T12:00:00').toLocaleDateString('ru',{weekday:'long',day:'numeric',month:'short'});

  let status,detail;
  if(ok){status='✅ В норме';detail=`${v} из ${m.goal}${m.key==='kcal'?'':' г'} (${pct}%)`}
  else if(ratio<m.lo){status='⬇️ Мало';detail=`${v} из ${m.goal}${m.key==='kcal'?'':' г'} (${pct}%) — не хватает ${Math.round(m.goal*m.lo-v)}${m.key==='kcal'?'':' г'}`}
  else{status='⬆️ Много';detail=`${v} из ${m.goal}${m.key==='kcal'?'':' г'} (${pct}%) — лишних ${Math.round(v-m.goal*m.hi)}${m.key==='kcal'?'':' г'}`}

  const popup=document.createElement('div');
  popup.className='food-popup';
  popup.innerHTML=`<div style="font-weight:600;margin-bottom:4px">${m.icon} ${m.name} — ${dayLabel}</div><div style="margin-bottom:2px">${status}</div><div style="color:var(--text2)">${detail}</div>`;
  document.body.appendChild(popup);

  const rect=e.target.closest('.cg-cell').getBoundingClientRect();
  let left=rect.left+rect.width/2-110;
  let top=rect.top-popup.offsetHeight-8;
  if(top<8)top=rect.bottom+8;
  if(left<8)left=8;
  if(left+220>window.innerWidth)left=window.innerWidth-228;
  popup.style.left=left+'px';popup.style.top=top+'px';

  setTimeout(()=>{popup.style.pointerEvents='auto'},10);
  const close=()=>{popup.remove();document.removeEventListener('click',close)};
  setTimeout(()=>document.addEventListener('click',close),50);
}

// ============ AI REPORT ============
async function generateAIReport(){
  const card=document.getElementById('ai-report-card');
  const result=document.getElementById('ai-report-result');
  if(!result)return;
  const k=getKey();
  if(!k){result.style.display='block';result.innerHTML='<div style="color:var(--coral)">Добавь Gemini API ключ в настройках</div>';return}
  result.style.display='block';
  result.innerHTML='<div style="text-align:center;color:var(--text3)">Анализирую данные...</div>';
  const days=reportMode==='week'?7:30;
  const label=reportMode==='week'?'неделю':'месяц';
  const hist=getHistoryRange(days);
  const foodH=getFoodRange(days);
  const cutoff=Date.now()-days*86400000;
  const moneyEntries=st.money.entries.filter(e=>e.ts>=cutoff);
  const media=st.media.filter(m=>m.ts>=cutoff);

  const restCats=new Set(['rest','gaming','social','hobby']);
  const activeMins=hist.filter(q=>!restCats.has(q.cat)).reduce((s,q)=>s+q.mins,0);
  const restMins=hist.filter(q=>restCats.has(q.cat)).reduce((s,q)=>s+q.mins,0);
  const totalXP=hist.reduce((s,q)=>s+q.xp,0);
  const byCat={};hist.forEach(q=>{if(!byCat[q.cat])byCat[q.cat]=0;byCat[q.cat]+=q.mins});
  const totalKcal=foodH.reduce((s,e)=>s+e.kcal,0);
  const totalProtein=foodH.reduce((s,e)=>s+e.protein,0);
  const totalExp=moneyEntries.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  const totalInc=moneyEntries.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);

  const summary=`За ${label}: ${Math.round(activeMins/60)}ч продуктивности, ${Math.round(restMins/60)}ч отдыха, ${totalXP} XP, ${hist.length} заданий. Категории: ${JSON.stringify(byCat)}. Стрик: ${st.streak||0} дней. Еда: ${Math.round(totalKcal)} ккал, ${Math.round(totalProtein)}г белка, ${foodH.length} приёмов пищи за ${days} дней. Финансы: расходы ${Math.round(totalExp)}, доходы ${Math.round(totalInc)}. Медиа: ${media.length} записей.`;

  try{
    const text=await callAI(
      'Ты персональный life-коуч. Проанализируй данные пользователя и дай краткое (3-5 пунктов) резюме на русском: что хорошо, что можно улучшить, конкретные советы. Будь дружелюбным, используй эмодзи. Не повторяй цифры — давай инсайты.',
      summary
    );
    result.innerHTML=text.replace(/\n/g,'<br>');
  }catch(e){
    result.innerHTML=`<div style="color:var(--coral)">${e.message==='NO_KEY'?'Добавь API ключ в настройках':'Ошибка API: '+e.message}</div>`;
  }
}

function getMoneyThisMonth(){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth();
  return st.money.entries.filter(e=>{const d=new Date(e.ts);return d.getFullYear()===y&&d.getMonth()===m});
}

function incomeOptions(){return Object.entries(INCOME_CATS).map(([k,v])=>`<option value="${k}">${INCOME_ICONS[k]||'⭐'} ${v}</option>`).join('')}

function addManualMoney(){
  const name=document.getElementById('mm-name').value.trim();
  const amount=parseFloat(document.getElementById('mm-amount').value);
  const type=document.getElementById('mm-type').value;
  const cat=document.getElementById('mm-cat').value;
  if(!name||!amount||amount<=0){alert('Введи название и сумму');return}
  st.money.entries.push({name,amount,cat,type,icon:moneyCatIcon(cat),ts:Date.now()});
  if(type==='expense'&&!st.money.budgets[cat])st.money.budgets[cat]=5000;
  save();render();
}

function addMoneyCategory(type){
  const label=prompt('Название категории:');
  if(!label)return;
  const icon=prompt('Эмодзи (одна):','⭐')||'⭐';
  const key=label.toLowerCase().replace(/\s+/g,'_').replace(/[^a-zа-яё0-9_]/gi,'');
  if(!key)return;
  if(type==='expense'){
    if(st.money.budgets[key]!==undefined){alert('Уже есть!');return}
    const budget=parseInt(prompt('Бюджет ₽/месяц:','5000'))||5000;
    st.money.budgets[key]=budget;
    EXPENSE_CATS[key]=label;
    EXPENSE_ICONS[key]=icon;
    if(!st.money.customExpenseCats)st.money.customExpenseCats={};
    st.money.customExpenseCats[key]={name:label,icon};
  } else {
    INCOME_CATS[key]=label;
    INCOME_ICONS[key]=icon;
    if(!st.money.customIncomeCats)st.money.customIncomeCats={};
    st.money.customIncomeCats[key]={name:label,icon};
  }
  save();render();
}

// Build dynamic category list for AI prompt
function renderMoneyMonthlyCompare(){
  // Build last 6 months data
  const now=new Date();
  const months=[];
  const mNames=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const y=d.getFullYear(),m=d.getMonth();
    const me=st.money.entries.filter(e=>{const ed=new Date(e.ts);return ed.getFullYear()===y&&ed.getMonth()===m});
    const exp=me.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
    const inc=me.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
    months.push({label:mNames[m],exp,inc,balance:inc-exp});
  }
  if(months.every(m=>m.exp===0&&m.inc===0))return'';
  const maxVal=Math.max(...months.map(m=>Math.max(m.exp,m.inc)),1);

  return`
    <div class="card">
      <div class="card-title">Сравнение по месяцам</div>
      <div style="display:flex;gap:8px;align-items:end;height:140px;padding-top:10px">
        ${months.map(m=>{
          const hE=Math.max(2,Math.round(m.exp/maxVal*110));
          const hI=Math.max(2,Math.round(m.inc/maxVal*110));
          return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
            <div style="display:flex;gap:2px;align-items:end;height:110px">
              <div style="width:14px;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--green),rgba(16,185,129,.4));height:${hI}px;transition:height .5s" title="Доход: ${Math.round(m.inc).toLocaleString()}₽"></div>
              <div style="width:14px;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--coral),rgba(244,63,94,.4));height:${hE}px;transition:height .5s" title="Расход: ${Math.round(m.exp).toLocaleString()}₽"></div>
            </div>
            <div style="font-size:10px;color:var(--text3)">${m.label}</div>
            <div style="font-family:var(--mono);font-size:9px;color:${m.balance>=0?'var(--green)':'var(--coral)'}">${m.balance>=0?'+':''}${(m.balance/1000).toFixed(0)}к</div>
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:16px;justify-content:center;margin-top:10px;font-size:10px;color:var(--text3)">
        <div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:2px;background:var(--green)"></div>Доходы</div>
        <div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:2px;background:var(--coral)"></div>Расходы</div>
      </div>
    </div>
  `;
}

function buildMoneyCatList(){
  const exp=Object.entries(EXPENSE_CATS).map(([k,v])=>`${k} (${v.replace(/^.\s*/,'')})`).join(', ');
  const inc=Object.entries(INCOME_CATS).map(([k,v])=>`${k} (${v.replace(/^.\s*/,'')})`).join(', ');
  return`Expense categories: ${exp}\nIncome categories: ${inc}`;
}

function getMoneyPrompt(){
  return`You are a JSON-only finance tracker. User reports expenses or income in Russian. Classify and extract.

${buildMoneyCatList()}

Rules:
- type = "income" for salary/зп/фриланс/перевод/подработка/продажа. Otherwise "expense"
- For income, use the most fitting income category key
- For expense, use the most fitting expense category key
- Extract amount in rubles. "350р"=350, "1.5к"=1500, "15т"=15000, "150000"=150000
- name = short description in Russian, max 25 chars
- icon = one emoji matching the item
- cat = MUST be one of the category keys listed above. Pick the closest match. If nothing fits use "other" or "other_income"
- comment = short fun note in Russian (max 10 words)
- ALWAYS try to classify. Only ask if amount is completely missing

Response format (ONLY this, nothing else):
{"name":"...","amount":0,"cat":"...","type":"expense","icon":"...","comment":"..."}`;
}

async function sendMoney(){
  if(!hasKey()){switchTab('settings');return}
  const inp=document.getElementById('money-in'),text=inp.value.trim();if(!text)return;
  st.moneyChatHistory.push({role:'user',text});inp.value='';save();render();
  const msgs=document.getElementById('money-msgs'),t=document.createElement('div');t.className='msg ai';t.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';msgs.appendChild(t);scrollC('money-msgs');
  try{
    const ai=await callAI(getMoneyPrompt(),text);t.remove();
    const p=extractJSON(ai);
    if(p&&p.name&&p.amount>0){
      const entry={name:p.name,amount:p.amount,cat:p.cat||'other',type:p.type||'expense',icon:p.icon||'💰',ts:Date.now()};
      st.money.entries.push(entry);
      // Auto-create budget for new expense category
      if(entry.type==='expense'&&!st.money.budgets[entry.cat]){
        st.money.budgets[entry.cat]=5000;
        EXPENSE_CATS[entry.cat]=entry.cat;
        EXPENSE_ICONS[entry.cat]=entry.icon||'⭐';
        if(!st.money.customExpenseCats)st.money.customExpenseCats={};
        st.money.customExpenseCats[entry.cat]={name:entry.cat,icon:entry.icon||'⭐'};
      }
      const sign=entry.type==='income'?'+':'−';
      const clr=entry.type==='income'?'var(--green)':'var(--text)';
      st.moneyChatHistory.push({role:'ai',html:`${entry.icon} <strong>${entry.name}</strong> — <span style="font-family:var(--mono);color:${clr}">${sign}${Math.round(entry.amount).toLocaleString()}₽</span><br><span style="font-size:11px;color:var(--text3)">${moneyCatName(entry.cat)}</span>${p.comment?` · <span style="font-size:11px;color:var(--text2)">${p.comment}</span>`:''}`});
    }else{st.moneyChatHistory.push({role:'ai',html:p?.comment||'Уточни сумму и что купил.'})}
  }catch(e){t.remove();st.moneyChatHistory.push({role:'ai',html:e.message==='BAD_KEY'?'❌ Неверный ключ.':'Ошибка связи.'})}
  save();render();
}

function handleMediaImage(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=document.getElementById('md-img-tag');
    const preview=document.getElementById('md-img-preview');
    const hidden=document.getElementById('md-image');
    // Resize to save localStorage space
    const canvas=document.createElement('canvas');
    const tmpImg=new Image();
    tmpImg.onload=()=>{
      const maxW=400;const scale=tmpImg.width>maxW?maxW/tmpImg.width:1;
      canvas.width=tmpImg.width*scale;canvas.height=tmpImg.height*scale;
      canvas.getContext('2d').drawImage(tmpImg,0,0,canvas.width,canvas.height);
      const dataUrl=canvas.toDataURL('image/jpeg',0.7);
      img.src=dataUrl;hidden.value=dataUrl;preview.style.display='block';
    };
    tmpImg.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function clearMediaImage(){
  document.getElementById('md-img-tag').src='';
  document.getElementById('md-img-preview').style.display='none';
  document.getElementById('md-image').value='';
}
function saveMedia(type,editIdx){
  const name=document.getElementById('md-name').value.trim();
  const rating=parseInt(document.getElementById('md-rating').value)||0;
  const comment=document.getElementById('md-comment').value.trim();
  const image=document.getElementById('md-image').value;
  if(!name){alert('Введи название');return}
  if(!rating){alert('Поставь оценку');return}
  if(editIdx!==null&&editIdx!==undefined){
    st.media[editIdx].name=name;
    st.media[editIdx].rating=rating;
    st.media[editIdx].comment=comment;
    st.media[editIdx].image=image;
  }else{
    st.media.push({type,name,rating,comment,image,ts:Date.now()});
  }
  save();document.querySelector('.modal-overlay').remove();render();
}

function editMedia(idx){
  const m=st.media[idx];if(!m)return;

// Get coordinates for a trip: city first, country fallback
function getTripCoords(t){
  if(t.city&&CITY_COORDS[t.city])return CITY_COORDS[t.city];
  if(COUNTRY_COORDS[t.country])return COUNTRY_COORDS[t.country];
  return null;
}

// GeoJSON cache
let _worldGeo=null;
async function fetchWorldGeo(){
  if(_worldGeo)return _worldGeo;
  try{
    const r=await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    const topo=await r.json();
    _worldGeo=topojson.feature(topo,topo.objects.countries);
    return _worldGeo;
  }catch(e){console.warn('Failed to load world GeoJSON',e);return null}
}
